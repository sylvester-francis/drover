version: 2

project_name: drover

before:
  hooks:
    - go mod tidy

builds:
  - id: drover
    main: ./cmd/drover
    binary: drover
    env:
      - CGO_ENABLED=0 # the SQLite backend is pure Go (modernc), so binaries are static
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: drover
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md

checksum:
  name_template: "checksums.txt"

# A CycloneDX SBOM per archive (via syft), uploaded with the release.
sboms:
  - id: archive
    artifacts: archive

# Keyless cosign signature over the checksums file, which vouches for every
# artifact it lists. No key to manage: the signer identity is the GitHub Actions
# OIDC token (Fulcio certificate + Rekor transparency log).
signs:
  - cmd: cosign
    certificate: "${artifact}.pem"
    signature: "${artifact}.sig"
    args:
      - sign-blob
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  draft: false
  prerelease: auto
